<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #e3f2fd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 60px 50px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 24px rgba(179, 229, 252, 0.4);
            text-align: center;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #81d4fa;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
        }

        h1 {
            color: #0288d1;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 12px;
        }

        p {
            color: #4fc3f7;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: #29b6f6;
            color: #ffffff;
            padding: 14px 0;
            width: 160px;
            border-radius: 6px;
            font-size: 16px;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #0288d1;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #81d4fa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">W</div>
        <h1>欢迎</h1>
        <p>浅蓝简约，即刻开始</p>
        <a href="#" class="btn">进入</a>
        <div class="footer">简约设计 &copy; 2025</div>
    </div>
</body>
</html>
